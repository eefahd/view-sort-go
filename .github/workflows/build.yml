name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        run: wails build -platform darwin/universal

      - name: Package .app into zip
        run: |
          cd build/bin
          zip -r view-sort-go-macos.zip view-sort-go.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: view-sort-go-macos
          path: build/bin/view-sort-go-macos.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        run: wails build -platform linux/amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: view-sort-go-linux
          path: build/bin/view-sort-go

  release:
    name: Create Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: view-sort-go-macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: view-sort-go-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            view-sort-go-macos.zip
            view-sort-go
